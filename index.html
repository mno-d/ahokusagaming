<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ヒット＆ブロー 4桁ゲーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #111;
      color: #f5f5f5;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 0 16px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-top: 0;
    }

    p {
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 8px;
    }

    input[type="number"] {
      flex: 1;
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      white-space: nowrap;
    }

    button.secondary {
      background: #4b5563;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .message {
      min-height: 1.4em;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #f97316;
    }

    .log {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #374151;
      padding-top: 8px;
      font-size: 0.9rem;
    }

    .log-entry {
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #111827;
    }

    .log-entry strong {
      color: #e5e7eb;
    }

    .small {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ヒット＆ブロー（4桁）</h1>
    <p>
      4桁の数字を当てるゲームです。<br />
      ・数字はすべて <strong>バラバラ</strong><br />
      ・先頭は <strong>0になりません</strong><br />
      例：1234, 9472 など
    </p>

    <div class="status" id="statusText">
      ゲーム開始ボタンを押してね。
    </div>

    <div class="message" id="message"></div>

    <div class="input-row">
      <input
        id="guessInput"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="1234"
        disabled
      />
      <button id="guessBtn" disabled>決定</button>
    </div>

    <div class="input-row">
      <button id="startBtn">ゲーム開始/リセット</button>
      <button id="giveupBtn" class="secondary" disabled>ギブアップ</button>
    </div>

    <div class="small">
      ヒット：桁も数字も一致 / ブロー：数字だけ一致（場所違い）
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    const DIGITS = 4;

    let answer = "";
    let tries = 0;
    let gameActive = false;

    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const startBtn = document.getElementById("startBtn");
    const giveupBtn = document.getElementById("giveupBtn");
    const messageEl = document.getElementById("message");
    const logEl = document.getElementById("log");
    const statusText = document.getElementById("statusText");

    function generateAnswer() {
      const digits = "0123456789".split("");
      const firstIndex = Math.floor(Math.random() * 9) + 1; // 1〜9
      const first = digits[firstIndex];
      digits.splice(firstIndex, 1);
      // 残り3つ
      const rest = [];
      for (let i = 0; i < DIGITS - 1; i++) {
        const idx = Math.floor(Math.random() * digits.length);
        rest.push(digits[idx]);
        digits.splice(idx, 1);
      }
      return first + rest.join("");
    }

    function calcHitAndBlow(ans, guess) {
      let hit = 0;
      let blow = 0;

      for (let i = 0; i < DIGITS; i++) {
        if (guess[i] === ans[i]) {
          hit++;
        } else if (ans.includes(guess[i])) {
          blow++;
        }
      }
      return { hit, blow };
    }

    function startGame() {
      answer = generateAnswer();
      tries = 0;
      gameActive = true;
      guessInput.disabled = false;
      guessBtn.disabled = false;
      giveupBtn.disabled = false;
      guessInput.value = "";
      guessInput.focus();
      messageEl.textContent = "";
      logEl.innerHTML = "";
      statusText.textContent = "ゲーム開始！4桁の数字を当ててみてね。";
      console.log("答え:", answer); // デバッグ用。友達に見せたくなければ消してOK
    }

    function endGame() {
      gameActive = false;
      guessInput.disabled = true;
      guessBtn.disabled = true;
      giveupBtn.disabled = true;
    }

    function addLog(text) {
      const div = document.createElement("div");
      div.className = "log-entry";
      div.innerHTML = text;
      logEl.prepend(div); // 最新を上に
    }

    function handleGuess() {
      if (!gameActive) return;

      const raw = guessInput.value.trim();
      messageEl.textContent = "";

      if (!raw) {
        messageEl.textContent = "数字を入力してね。";
        return;
      }

      // ゼロ埋めされる可能性があるので文字列のまま扱う
      if (!/^\d+$/.test(raw)) {
        messageEl.textContent = "数字だけを入力してね。";
        return;
      }

      const guess = raw;

      if (guess.length !== DIGITS) {
        messageEl.textContent = `${DIGITS}桁で入力してね。`;
        return;
      }

      const set = new Set(guess.split(""));
      if (set.size !== DIGITS) {
        messageEl.textContent = "同じ数字は使えないよ。（全部バラバラ）";
        return;
      }

      if (guess[0] === "0") {
        messageEl.textContent = "先頭は0以外にしてね。";
        return;
      }

      tries++;
      const { hit, blow } = calcHitAndBlow(answer, guess);
      addLog(
        `<strong>${guess}</strong> ▶ ヒット: <strong>${hit}</strong>, ブロー: <strong>${blow}</strong>（${tries}回目）`
      );

      if (hit === DIGITS) {
        statusText.textContent = `🎉 正解！答えは ${answer} でした！（${tries}回でクリア）`;
        messageEl.textContent = "";
        endGame();
      } else {
        statusText.textContent = `ヒット: ${hit}, ブロー: ${blow}（${tries}回目）`;
        guessInput.value = "";
        guessInput.focus();
      }
    }

    guessBtn.addEventListener("click", handleGuess);

    guessInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") {
        handleGuess();
      }
    });

    startBtn.addEventListener("click", () => {
      startGame();
    });

    giveupBtn.addEventListener("click", () => {
      if (!gameActive) return;
      statusText.textContent = `ギブアップ！答えは ${answer} でした。`;
      addLog(`<strong>ギブアップ</strong> ▶ 答え: <strong>${answer}</strong>`);
      endGame();
    });
  </script>
</body>
</html>
