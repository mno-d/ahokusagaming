<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ヒット＆ブロー 4桁ゲーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #111;
      color: #f5f5f5;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 0 16px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-top: 0;
    }

    p {
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 8px;
    }

    input[type="number"] {
      flex: 1;
      padding: 10px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      white-space: nowrap;
    }

    button.secondary {
      background: #4b5563;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .message {
      min-height: 1.4em;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #f97316;
    }

    .log {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #374151;
      padding-top: 8px;
      font-size: 0.9rem;
    }

    .log-entry {
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #111827;
    }

    .log-entry strong {
      color: #e5e7eb;
    }

    .small {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }

    /* ▼ ここから記録用の見た目 ▼ */
    .stats {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #111827;
      border: 1px solid #374151;
      font-size: 0.85rem;
    }

    .stats-title {
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #e5e7eb;
      font-weight: 600;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .stats-label {
      color: #9ca3af;
    }

    .stats-value {
      color: #f9fafb;
      font-weight: 600;
    }
    /* ▲ 記録用の見た目ここまで ▲ */
  </style>
</head>
<body>
  <div class="container">
    <h1>ヒット＆ブロー（4桁）</h1>
    <p>
      4桁の数字を当てるゲームです。<br />
      ・数字はすべて <strong>バラバラ</strong><br />
      ・先頭は <strong>0になりません</strong><br />
      例：1234, 9472 など
    </p>

    <div class="status" id="statusText">
      ゲーム開始ボタンを押してね。
    </div>

    <div class="message" id="message"></div>

    <div class="input-row">
      <input
        id="guessInput"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="1234"
        disabled
      />
      <button id="guessBtn" disabled>決定</button>
    </div>

    <div class="input-row">
      <button id="startBtn">ゲーム開始/リセット</button>
      <button id="giveupBtn" class="secondary" disabled>ギブアップ</button>
    </div>

    <div class="small">
      ヒット：桁も数字も一致 / ブロー：数字だけ一致（場所違い）
    </div>

    <!-- ▼ 記録表示エリア ▼ -->
    <div class="stats">
      <div class="stats-title">📊 記録（この端末・このブラウザ専用）</div>
      <div class="stats-row">
        <div class="stats-label">プレイ回数</div>
        <div class="stats-value" id="statTotal">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">クリア回数</div>
        <div class="stats-value" id="statClears">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">ベスト（最小手数）</div>
        <div class="stats-value" id="statBest">-</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">平均手数（クリア時のみ）</div>
        <div class="stats-value" id="statAvg">-</div>
      </div>
    </div>
    <!-- ▲ 記録表示エリアここまで ▲ -->

    <div class="log" id="log"></div>
  </div>

  <script>
    const DIGITS = 4;

    let answer = "";
    let tries = 0;
    let gameActive = false;

    // === 戦績用データ ===
    const STORAGE_KEY_STATS = "hb_stats_v1";
    let stats = {
      totalGames: 0,        // プレイ回数
      clears: 0,            // クリア回数
      bestTries: null,      // ベスト手数（小さいほど良い）
      totalTriesOnClear: 0  // クリアしたときの手数合計（平均用）
    };

    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const startBtn = document.getElementById("startBtn");
    const giveupBtn = document.getElementById("giveupBtn");
    const messageEl = document.getElementById("message");
    const logEl = document.getElementById("log");
    const statusText = document.getElementById("statusText");

    // 戦績表示用要素
    const statTotal = document.getElementById("statTotal");
    const statClears = document.getElementById("statClears");
    const statBest = document.getElementById("statBest");
    const statAvg = document.getElementById("statAvg");

    // ===== 戦績の読み込み・保存・表示 =====
    function loadStats() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATS);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (typeof data.totalGames === "number") stats.totalGames = data.totalGames;
        if (typeof data.clears === "number") stats.clears = data.clears;
        if (typeof data.totalTriesOnClear === "number") stats.totalTriesOnClear = data.totalTriesOnClear;
        if (data.bestTries === null || typeof data.bestTries === "number") {
          stats.bestTries = data.bestTries;
        }
      } catch (e) {
        console.warn("戦績の読み込みに失敗しました:", e);
      }
    }

    function saveStats() {
      try {
        localStorage.setItem(STORAGE_KEY_STATS, JSON.stringify(stats));
      } catch (e) {
        console.warn("戦績の保存に失敗しました:", e);
      }
    }

    function updateStatsView() {
      statTotal.textContent = stats.totalGames;
      statClears.textContent = stats.clears;

      if (stats.bestTries == null) {
        statBest.textContent = "-";
      } else {
        statBest.textContent = stats.bestTries + " 手";
      }

      if (stats.clears === 0) {
        statAvg.textContent = "-";
      } else {
        const avg = stats.totalTriesOnClear / stats.clears;
        statAvg.textContent = avg.toFixed(1) + " 手";
      }
    }

    // ===== ゲームロジック =====
    function generateAnswer() {
      const digits = "0123456789".split("");
      const firstIndex = Math.floor(Math.random() * 9) + 1; // 1〜9
      const first = digits[firstIndex];
      digits.splice(firstIndex, 1);
      // 残り3つ
      const rest = [];
      for (let i = 0; i < DIGITS - 1; i++) {
        const idx = Math.floor(Math.random() * digits.length);
        rest.push(digits[idx]);
        digits.splice(idx, 1);
      }
      return first + rest.join("");
    }

    function calcHitAndBlow(ans, guess) {
      let hit = 0;
      let blow = 0;

      for (let i = 0; i < DIGITS; i++) {
        if (guess[i] === ans[i]) {
          hit++;
        } else if (ans.includes(guess[i])) {
          blow++;
        }
      }
      return { hit, blow };
    }

    function startGame() {
      answer = generateAnswer();
      tries = 0;
      gameActive = true;
      guessInput.disabled = false;
      guessBtn.disabled = false;
      giveupBtn.disabled = false;
      guessInput.value = "";
      guessInput.focus();
      messageEl.textContent = "";
      logEl.innerHTML = "";
      statusText.textContent = "ゲーム開始！4桁の数字を当ててみてね。";
      console.log("答え:", answer); // デバッグ用。友達に見せたくなければ消してOK

      // 新しいゲーム開始 → プレイ回数を加算
      stats.totalGames += 1;
      saveStats();
      updateStatsView();
    }

    function endGame() {
      gameActive = false;
      guessInput.disabled = true;
      guessBtn.disabled = true;
      giveupBtn.disabled = true;
    }

    function addLog(text) {
      const div = document.createElement("div");
      div.className = "log-entry";
      div.innerHTML = text;
      logEl.prepend(div); // 最新を上に
    }

    function handleGuess() {
      if (!gameActive) return;

      const raw = guessInput.value.trim();
      messageEl.textContent = "";

      if (!raw) {
        messageEl.textContent = "数字を入力してね。";
        return;
      }

      // ゼロ埋めされる可能性があるので文字列のまま扱う
      if (!/^\d+$/.test(raw)) {
        messageEl.textContent = "数字だけを入力してね。";
        return;
      }

      const guess = raw;

      if (guess.length !== DIGITS) {
        messageEl.textContent = `${DIGITS}桁で入力してね。`;
        return;
      }

      const set = new Set(guess.split(""));
      if (set.size !== DIGITS) {
        messageEl.textContent = "同じ数字は使えないよ。（全部バラバラ）";
        return;
      }

      if (guess[0] === "0") {
        messageEl.textContent = "先頭は0以外にしてね。";
        return;
      }

      tries++;
      const { hit, blow } = calcHitAndBlow(answer, guess);
      addLog(
        `<strong>${guess}</strong> ▶ ヒット: <strong>${hit}</strong>, ブロー: <strong>${blow}</strong>（${tries}回目）`
      );

      if (hit === DIGITS) {
        statusText.textContent = `🎉 正解！答えは ${answer} でした！（${tries}回でクリア）`;
        messageEl.textContent = "";

        // クリア時に戦績を更新
        stats.clears += 1;
        stats.totalTriesOnClear += tries;
        if (stats.bestTries === null || tries < stats.bestTries) {
          stats.bestTries = tries;
        }
        saveStats();
        updateStatsView();

        endGame();
      } else {
        statusText.textContent = `ヒット: ${hit}, ブロー: ${blow}（${tries}回目）`;
        guessInput.value = "";
        guessInput.focus();
      }
    }

    guessBtn.addEventListener("click", handleGuess);

    guessInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") {
        handleGuess();
      }
    });

    startBtn.addEventListener("click", () => {
      startGame();
    });

    giveupBtn.addEventListener("click", () => {
      if (!gameActive) return;
      statusText.textContent = `ギブアップ！答えは ${answer} でした。`;
      addLog(`<strong>ギブアップ</strong> ▶ 答え: <strong>${answer}</strong>`);
      endGame();
      // ギブアップ時は戦績はそのまま（プレイ回数だけカウント済み）
      saveStats();
      updateStatsView();
    });

    // ページ読み込み時に戦績を復元
    loadStats();
    updateStatsView();
  </script>
</body>
</html>
