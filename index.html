<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ヒット＆ブロー 3桁ゲーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: #111;
      color: #f5f5f5;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 0 16px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-top: 0;
    }

    p {
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 8px;
      align-items: center;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      white-space: nowrap;
    }

    button.secondary {
      background: #4b5563;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .message {
      min-height: 1.4em;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #f97316;
    }

    .log {
      margin-top: 12px;
      border-top: 1px solid #374151;
      padding-top: 8px;
      font-size: 0.9rem;
    }

    .log-entry {
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #111827;
    }

    .log-entry strong {
      color: #e5e7eb;
    }

    .small {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }

    /* ▼ スロット＆数字チップ ▼ */
    .slots {
      display: flex;
      gap: 8px;
    }

    .slot {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #020617;
      border: 2px solid #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #e5e7eb;
      user-select: none;
      touch-action: manipulation;
    }

    .slot.empty {
      color: #4b5563;
      font-size: 1.2rem;
    }

    .slot.highlight {
      border-color: #f97316;
      box-shadow: 0 0 0 2px rgba(249,115,22,0.5);
    }

    .digit-pad {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .digit {
      padding: 10px 0;
      border-radius: 999px;
      background: #374151;
      color: #f9fafb;
      font-size: 1.1rem;
      border: none;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    .digit.used {
      opacity: 0.35;
    }

    .digit:active {
      transform: translateY(1px) scale(0.98);
    }
    /* ▲ スロット＆数字チップここまで ▲ */

    /* ▼ 記録用の見た目 ▼ */
    .stats {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #111827;
      border: 1px solid #374151;
      font-size: 0.85rem;
    }

    .stats-title {
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #e5e7eb;
      font-weight: 600;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .stats-label {
      color: #9ca3af;
    }

    .stats-value {
      color: #f9fafb;
      font-weight: 600;
    }
    /* ▲ 記録用の見た目ここまで ▲ */

    /* ▼ 正解時お祝いオーバーレイ ▼ */
    .celebration {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.18), rgba(0,0,0,0.9));
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.25s ease-out;
    }

    .celebration.show {
      display: flex;
    }

    .celebration-content {
      text-align: center;
      animation: popIn 0.4s ease-out;
    }

    .celebration-emoji {
      font-size: 3.5rem;
      margin-bottom: 8px;
      animation: bounce 0.8s ease-out infinite;
    }

    .celebration-text {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    .celebration-sub {
      font-size: 1rem;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .celebration-note {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0.9;
      animation: confettiFall 1.8s linear forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-20vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }
    /* ▲ お祝い演出ここまで ▲ */
  </style>
</head>
<body>
  <div class="container">
    <h1>ヒット＆ブロー（3桁）</h1>
    <p>
      3桁の数字を当てるゲームです。<br />
      ・数字はすべて <strong>バラバラ</strong><br />
      ・先頭は <strong>0になりません</strong><br />
      例：123, 947 など
    </p>

    <div class="status" id="statusText">
      ゲーム開始ボタンを押してね。
    </div>

    <div class="message" id="message"></div>

    <!-- 入力スロット + 決定ボタン -->
    <div class="input-row">
      <div class="slots">
        <div class="slot empty" data-index="0">□</div>
        <div class="slot empty" data-index="1">□</div>
        <div class="slot empty" data-index="2">□</div>
      </div>
      <button id="guessBtn" disabled>決定</button>
    </div>

    <!-- 数字チップ -->
    <div class="digit-pad" id="digitPad">
      <button class="digit" data-digit="1" draggable="true">1</button>
      <button class="digit" data-digit="2" draggable="true">2</button>
      <button class="digit" data-digit="3" draggable="true">3</button>
      <button class="digit" data-digit="4" draggable="true">4</button>
      <button class="digit" data-digit="5" draggable="true">5</button>
      <button class="digit" data-digit="6" draggable="true">6</button>
      <button class="digit" data-digit="7" draggable="true">7</button>
      <button class="digit" data-digit="8" draggable="true">8</button>
      <button class="digit" data-digit="9" draggable="true">9</button>
      <button class="digit" data-digit="0" draggable="true">0</button>
    </div>

    <div class="input-row">
      <button id="startBtn">ゲーム開始/リセット</button>
      <button id="giveupBtn" class="secondary" disabled>ギブアップ</button>
    </div>

    <div class="small">
      数字は下のチップをタップするかドラッグしてスロットに置いてね。<br>
      スロットをタップするとその桁が消えるよ。
    </div>

    <!-- ログ -->
    <div class="log" id="log"></div>

    <!-- ▼ 記録表示エリア（ページ最下部） ▼ -->
    <div class="stats">
      <div class="stats-title">📊 記録（この端末・このブラウザ専用）</div>
      <div class="stats-row">
        <div class="stats-label">プレイ回数</div>
        <div class="stats-value" id="statTotal">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">クリア回数</div>
        <div class="stats-value" id="statClears">0</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">ベスト（最小手数）</div>
        <div class="stats-value" id="statBest">-</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">平均手数（クリア時のみ）</div>
        <div class="stats-value" id="statAvg">-</div>
      </div>
    </div>
    <!-- ▲ 記録表示エリアここまで ▲ -->
  </div>

  <!-- ▼ 正解時のお祝いオーバーレイ ▼ -->
  <div id="celebration" class="celebration">
    <div class="celebration-content">
      <div class="celebration-emoji">🎉</div>
      <div class="celebration-text" id="celebrationText">正解！</div>
      <div class="celebration-sub" id="celebrationSub">おめでとう！</div>
      <div class="celebration-note">画面は自動で閉じます</div>
    </div>
  </div>
  <!-- ▲ お祝いオーバーレイここまで ▲ -->

  <script>
    const DIGITS = 3;

    let answer = "";
    let tries = 0;
    let gameActive = false;

    // スロットの状態（null or "0"〜"9"）
    let slotValues = [null, null, null];

    // === 戦績用データ ===
    const STORAGE_KEY_STATS = "hb_stats_v1";
    let stats = {
      totalGames: 0,        // プレイ回数
      clears: 0,            // クリア回数
      bestTries: null,      // ベスト手数（小さいほど良い）
      totalTriesOnClear: 0  // クリアしたときの手数合計（平均用）
    };

    const guessBtn = document.getElementById("guessBtn");
    const startBtn = document.getElementById("startBtn");
    const giveupBtn = document.getElementById("giveupBtn");
    const messageEl = document.getElementById("message");
    const logEl = document.getElementById("log");
    const statusText = document.getElementById("statusText");

    const slots = Array.from(document.querySelectorAll(".slot"));
    const digitButtons = Array.from(document.querySelectorAll(".digit"));

    // 戦績表示用要素
    const statTotal = document.getElementById("statTotal");
    const statClears = document.getElementById("statClears");
    const statBest = document.getElementById("statBest");
    const statAvg = document.getElementById("statAvg");

    // お祝い関連
    const celebrationEl = document.getElementById("celebration");
    const celebrationTextEl = document.getElementById("celebrationText");
    const celebrationSubEl = document.getElementById("celebrationSub");

    // ===== 戦績の読み込み・保存・表示 =====
    function loadStats() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATS);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (typeof data.totalGames === "number") stats.totalGames = data.totalGames;
        if (typeof data.clears === "number") stats.clears = data.clears;
        if (typeof data.totalTriesOnClear === "number") stats.totalTriesOnClear = data.totalTriesOnClear;
        if (data.bestTries === null || typeof data.bestTries === "number") {
          stats.bestTries = data.bestTries;
        }
      } catch (e) {
        console.warn("戦績の読み込みに失敗しました:", e);
      }
    }

    function saveStats() {
      try {
        localStorage.setItem(STORAGE_KEY_STATS, JSON.stringify(stats));
      } catch (e) {
        console.warn("戦績の保存に失敗しました:", e);
      }
    }

    function updateStatsView() {
      statTotal.textContent = stats.totalGames;
      statClears.textContent = stats.clears;

      if (stats.bestTries == null) {
        statBest.textContent = "-";
      } else {
        statBest.textContent = stats.bestTries + " 手";
      }

      if (stats.clears === 0) {
        statAvg.textContent = "-";
      } else {
        const avg = stats.totalTriesOnClear / stats.clears;
        statAvg.textContent = avg.toFixed(1) + " 手";
      }
    }

    // ===== スロット & 数字チップ表示更新 =====
    function updateDigitButtonsView() {
      digitButtons.forEach(btn => {
        const d = btn.dataset.digit;
        if (slotValues.includes(d)) {
          btn.classList.add("used");
        } else {
          btn.classList.remove("used");
        }
      });
    }

    function updateSlotsView() {
      slots.forEach((slot, index) => {
        const v = slotValues[index];
        if (v === null) {
          slot.textContent = "□";
          slot.classList.add("empty");
        } else {
          slot.textContent = v;
          slot.classList.remove("empty");
        }
      });
      updateDigitButtonsView();
      updateGuessBtnState();
    }

    function updateGuessBtnState() {
      const filled = slotValues.every(v => v !== null);
      guessBtn.disabled = !gameActive || !filled;
    }

    function isDigitUsed(d) {
      return slotValues.includes(d);
    }

    function canPlaceDigitAt(index, digit) {
      if (index === 0 && digit === "0") {
        messageEl.textContent = "先頭は0以外にしてね。";
        return false;
      }
      if (isDigitUsed(digit)) {
        messageEl.textContent = "同じ数字は使えないよ。（全部バラバラ）";
        return false;
      }
      return true;
    }

    function placeDigitInFirstEmpty(digit) {
      const idx = slotValues.findIndex(v => v === null);
      if (idx === -1) {
        messageEl.textContent = `もう${DIGITS}桁入っているよ。消したい桁をタップしてね。`;
        return;
      }
      if (!canPlaceDigitAt(idx, digit)) return;
      slotValues[idx] = digit;
      messageEl.textContent = "";
      updateSlotsView();
    }

    // ===== お祝い演出 =====
    function randomColor() {
      const colors = ["#f97316", "#22c55e", "#3b82f6", "#eab308", "#ec4899", "#a855f7"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function createConfettiPieces() {
      const old = celebrationEl.querySelectorAll(".confetti");
      old.forEach(el => el.remove());

      const count = 30;
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.backgroundColor = randomColor();
        piece.style.animationDelay = (Math.random() * 0.6) + "s";
        piece.style.transform = `translateY(-20vh) rotate(${Math.random() * 360}deg)`;
        celebrationEl.appendChild(piece);
      }
    }

    function showCelebration(tries) {
      celebrationTextEl.textContent = "正解！";
      celebrationSubEl.textContent = `${tries}回で当てたよ！すごい！`;
      createConfettiPieces();
      celebrationEl.classList.add("show");

      setTimeout(() => {
        celebrationEl.classList.remove("show");
        const old = celebrationEl.querySelectorAll(".confetti");
        old.forEach(el => el.remove());
      }, 2200);
    }

    // ===== ゲームロジック =====
    function generateAnswer() {
      const digits = "0123456789".split("");
      const firstIndex = Math.floor(Math.random() * 9) + 1; // 1〜9
      const first = digits[firstIndex];
      digits.splice(firstIndex, 1);
      const rest = [];
      for (let i = 0; i < DIGITS - 1; i++) {
        const idx = Math.floor(Math.random() * digits.length);
        rest.push(digits[idx]);
        digits.splice(idx, 1);
      }
      return first + rest.join("");
    }

    function calcHitAndBlow(ans, guess) {
      let hit = 0;
      let blow = 0;

      for (let i = 0; i < DIGITS; i++) {
        if (guess[i] === ans[i]) {
          hit++;
        } else if (ans.includes(guess[i])) {
          blow++;
        }
      }
      return { hit, blow };
    }

    function resetSlots() {
      slotValues = [null, null, null];
      updateSlotsView();
    }

    function startGame() {
      answer = generateAnswer();
      tries = 0;
      gameActive = true;
      guessBtn.disabled = true;
      giveupBtn.disabled = false;
      resetSlots();
      messageEl.textContent = "";
      logEl.innerHTML = "";
      statusText.textContent = "ゲーム開始！3桁の数字を当ててみてね。";
      console.log("答え:", answer); // デバッグ用。不要なら削除OK

      stats.totalGames += 1;
      saveStats();
      updateStatsView();
    }

    function endGame() {
      gameActive = false;
      guessBtn.disabled = true;
      giveupBtn.disabled = true;
    }

    function addLog(text) {
      const div = document.createElement("div");
      div.className = "log-entry";
      div.innerHTML = text;
      logEl.prepend(div);
    }

    function handleGuess() {
      if (!gameActive) return;

      if (slotValues.some(v => v === null)) {
        messageEl.textContent = `${DIGITS}桁すべて埋めてね。`;
        return;
      }

      const guess = slotValues.join(""); // "123" みたいな文字列
      messageEl.textContent = "";

      tries++;
      const { hit, blow } = calcHitAndBlow(answer, guess);
      addLog(
        `<strong>${guess}</strong> ▶ ヒット: <strong>${hit}</strong>, ブロー: <strong>${blow}</strong>（${tries}回目）`
      );

      if (hit === DIGITS) {
        statusText.textContent = `🎉 正解！答えは ${answer} でした！（${tries}回でクリア）`;

        stats.clears += 1;
        stats.totalTriesOnClear += tries;
        if (stats.bestTries === null || tries < stats.bestTries) {
          stats.bestTries = tries;
        }
        saveStats();
        updateStatsView();

        showCelebration(tries);
        endGame();
      } else {
        statusText.textContent = `ヒット: ${hit}, ブロー: ${blow}（${tries}回目）`;
      }
    }

    // ===== イベントセットアップ =====

    // 数字チップ：タップで入力
    digitButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (!gameActive) {
          messageEl.textContent = "まずはゲーム開始ボタンを押してね。";
          return;
        }
        const d = btn.dataset.digit;
        messageEl.textContent = "";

        if (isDigitUsed(d)) {
          // すでに使われていたら、その桁を外す（トグル）
          const idx = slotValues.indexOf(d);
          slotValues[idx] = null;
          updateSlotsView();
          return;
        }
        placeDigitInFirstEmpty(d);
      });

      // ドラッグ開始
      btn.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", btn.dataset.digit);
      });
    });

    // スロット：タップで消す & ドロップでセット
    slots.forEach((slot, index) => {
      slot.addEventListener("click", () => {
        if (!gameActive) return;
        if (slotValues[index] !== null) {
          slotValues[index] = null;
          messageEl.textContent = "";
          updateSlotsView();
        }
      });

      slot.addEventListener("dragover", (e) => {
        if (!gameActive) return;
        e.preventDefault();
        slot.classList.add("highlight");
      });

      slot.addEventListener("dragleave", () => {
        slot.classList.remove("highlight");
      });

      slot.addEventListener("drop", (e) => {
        if (!gameActive) return;
        e.preventDefault();
        slot.classList.remove("highlight");
        const digit = e.dataTransfer.getData("text/plain");
        if (!digit) return;

        messageEl.textContent = "";

        // 既にその数字が他のスロットにあれば外す
        const existingIndex = slotValues.indexOf(digit);
        if (existingIndex !== -1 && existingIndex !== index) {
          slotValues[existingIndex] = null;
        }

        // ここで重複＆先頭0チェック
        if (!canPlaceDigitAt(index, digit)) {
          return;
        }

        slotValues[index] = digit;
        updateSlotsView();
      });
    });

    guessBtn.addEventListener("click", handleGuess);

    startBtn.addEventListener("click", () => {
      startGame();
    });

    giveupBtn.addEventListener("click", () => {
      if (!gameActive) return;
      statusText.textContent = `ギブアップ！答えは ${answer} でした。`;
      addLog(`<strong>ギブアップ</strong> ▶ 答え: <strong>${answer}</strong>`);
      endGame();
      saveStats();
      updateStatsView();
    });

    // ページ読み込み時に戦績を復元
    loadStats();
    updateStatsView();
    updateSlotsView();
  </script>
</body>
</html>
